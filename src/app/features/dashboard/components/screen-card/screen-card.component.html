<article class="screen-card">
  <div class="screen-card__header">
    <h2>{{ screen.screenId }}</h2>

    <div class="screen-card__header-actions">
      @if (appMode === 'MANUAL') {
        <div
          class="screen-card__start-show"
          [attr.title]="startShowHelpText">
          <button
            type="button"
            class="screen-card__start-show-button"
            [class.screen-card__start-show-button--overdue]="isStartShowOverdue"
            [disabled]="!canStartShow"
            (click)="startShow.emit(screen.screenId)">
            Start show
          </button>
        </div>
      }

      <app-screen-state-badge [state]="screen.runtime.supervisedState"></app-screen-state-badge>
    </div>
  </div>

  <app-snapshot-panel [runtime]="screen.runtime"></app-snapshot-panel>

  <app-door-reminder-panel [doorReminder]="screen.doorReminder"></app-door-reminder-panel>

  @if (showSimulationTools) {
    <div class="screen-card__simulation-tools">
      <div class="screen-card__simulation-tools-label">Simulation input</div>

      <app-timing-plan-panel
        [screenId]="screen.screenId"
        [busy]="busy"
        [timingPlan]="screen.runtime.timingPlan"
        (setTimingPlan)="setTimingPlan.emit($event)">
      </app-timing-plan-panel>
    </div>
  }
</article>
